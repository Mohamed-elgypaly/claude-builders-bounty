name: 'PR Reviewer Agent'
description: 'Analyze PR diffs and provide structured Markdown feedback'
inputs:
  pr_number:
    description: 'The number of the pull request'
    required: true
  repo:
    description: 'The repository (owner/repo)'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Run Reviewer
      shell: bash
      run: python ${{ github.action_path }}/pr_reviewer.py ${{ inputs.pr_number }} --repo ${{ inputs.repo }} --mock
