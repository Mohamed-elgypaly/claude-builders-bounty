name: 'PR Reviewer Agent'
description: 'Analyze PR diffs and provide structured Markdown feedback using Claude'
inputs:
  pr_number:
    description: 'The number of the pull request'
    required: true
  repo:
    description: 'The repository (owner/repo)'
    required: false
  anthropic_api_key:
    description: 'Anthropic API Key'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      shell: bash
      run: pip install -r ${{ github.action_path }}/requirements.txt
    - name: Run Reviewer
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        GITHUB_TOKEN: ${{ github.token }}
      run: python ${{ github.action_path }}/pr_reviewer.py --pr ${{ inputs.pr_number }} --repo ${{ inputs.repo }}
